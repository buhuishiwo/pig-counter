<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猪只计数测试页</title>
  <style>
    :root {
      --bg: #f4efe6;
      --paper: #fffaf2;
      --panel: rgba(255, 250, 242, 0.78);
      --ink: #1e1915;
      --muted: #6d645c;
      --line: rgba(77, 62, 47, 0.16);
      --accent: #cb6b2e;
      --accent-deep: #8e4318;
      --ok: #1e9b66;
      --shadow: 0 18px 50px rgba(73, 48, 29, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(226, 168, 113, 0.35), transparent 28%),
        radial-gradient(circle at right center, rgba(152, 196, 146, 0.22), transparent 22%),
        linear-gradient(180deg, #f9f4ec 0%, #f0e7da 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .hero {
      padding: 28px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(248,235,218,0.9));
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .controls {
      padding: 22px;
    }

    .controls h2, .results h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(85, 65, 49, 0.18);
      background: rgba(255,255,255,0.78);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--ink);
      outline: none;
    }

    .field input:focus {
      border-color: rgba(203, 107, 46, 0.58);
      box-shadow: 0 0 0 4px rgba(203, 107, 46, 0.12);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .6; cursor: default; transform: none; }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      box-shadow: 0 12px 30px rgba(143, 67, 24, 0.28);
    }

    .secondary {
      background: rgba(255,255,255,0.88);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .results {
      padding: 22px;
    }

    .status {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      font-size: 13px;
      border: 1px solid rgba(73, 57, 41, 0.12);
    }

    .status.ok {
      color: #0e6c44;
      background: rgba(30, 155, 102, 0.08);
      border-color: rgba(30, 155, 102, 0.18);
    }

    .status.error {
      color: #9b2d14;
      background: rgba(186, 62, 28, 0.08);
      border-color: rgba(186, 62, 28, 0.16);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--line);
    }

    .stat .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat strong {
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .viewer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .stage {
      overflow: hidden;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      min-height: 280px;
    }

    .stage header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .stage img {
      width: 100%;
      display: block;
      background: #efe6d8;
    }

    .placeholder {
      min-height: 280px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      padding: 20px;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.68);
      border-radius: 18px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(72, 57, 41, 0.1);
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(255,255,255,0.72);
    }

    tr:last-child td { border-bottom: 0; }

    @media (max-width: 980px) {
      .grid, .viewer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>猪只计数模型测试页</h1>
      <p>上传一张图片，页面会调用 `POST /api/predict` 完成推理，返回猪只数量、检测框和标注图。适合联调接口、验模型和给业务方现场演示。</p>
    </section>

    <div class="grid">
      <aside class="card controls">
        <h2>推理参数</h2>
        <form id="predictForm">
          <div class="field">
            <label for="imageFile">测试图片</label>
            <input id="imageFile" name="file" type="file" accept="image/*" required />
          </div>
          <div class="row-2">
            <div class="field">
              <label for="confThreshold">置信度</label>
              <input id="confThreshold" type="number" min="0" max="1" step="0.01" value="0.25" />
            </div>
            <div class="field">
              <label for="iouThreshold">IOU</label>
              <input id="iouThreshold" type="number" min="0" max="1" step="0.01" value="0.45" />
            </div>
          </div>
          <div class="field">
            <label for="imgsz">输入尺寸</label>
            <input id="imgsz" type="number" min="32" step="32" value="960" />
          </div>
          <div class="actions">
            <button class="primary" id="submitBtn" type="submit">开始测试</button>
            <button class="secondary" id="healthBtn" type="button">健康检查</button>
          </div>
        </form>
        <div class="hint" id="configHint">正在读取服务配置...</div>
      </aside>

      <main class="card results">
        <h2>结果面板</h2>
        <div class="status" id="status">等待上传图片。</div>

        <section class="stats">
          <article class="stat">
            <span class="label">预测数量</span>
            <strong id="countValue">0</strong>
          </article>
          <article class="stat">
            <span class="label">处理耗时</span>
            <strong id="timeValue">0 ms</strong>
          </article>
          <article class="stat">
            <span class="label">图像尺寸</span>
            <strong id="sizeValue">-</strong>
          </article>
        </section>

        <section class="viewer">
          <article class="stage">
            <header><span>原图</span><span id="fileName">未选择文件</span></header>
            <div id="originalWrap" class="placeholder">选择一张图片后，这里会显示原图。</div>
          </article>
          <article class="stage">
            <header><span>标注结果</span><span id="modelInfo">未执行推理</span></header>
            <div id="annotatedWrap" class="placeholder">接口返回的标注图会显示在这里。</div>
          </article>
        </section>

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>类别</th>
              <th>置信度</th>
              <th>坐标</th>
            </tr>
          </thead>
          <tbody id="detectionsBody">
            <tr><td colspan="4">暂无检测结果</td></tr>
          </tbody>
        </table>
      </main>
    </div>
  </div>

  <script>
    const form = document.getElementById('predictForm');
    const fileInput = document.getElementById('imageFile');
    const confInput = document.getElementById('confThreshold');
    const iouInput = document.getElementById('iouThreshold');
    const imgszInput = document.getElementById('imgsz');
    const submitBtn = document.getElementById('submitBtn');
    const healthBtn = document.getElementById('healthBtn');
    const configHint = document.getElementById('configHint');
    const statusBox = document.getElementById('status');
    const countValue = document.getElementById('countValue');
    const timeValue = document.getElementById('timeValue');
    const sizeValue = document.getElementById('sizeValue');
    const fileName = document.getElementById('fileName');
    const modelInfo = document.getElementById('modelInfo');
    const originalWrap = document.getElementById('originalWrap');
    const annotatedWrap = document.getElementById('annotatedWrap');
    const detectionsBody = document.getElementById('detectionsBody');

    function setStatus(text, type = '') {
      statusBox.textContent = text;
      statusBox.className = `status ${type}`.trim();
    }

    function renderImage(container, src, alt) {
      container.innerHTML = '';
      const img = document.createElement('img');
      img.src = src;
      img.alt = alt;
      container.appendChild(img);
    }

    function renderDetections(detections) {
      if (!detections.length) {
        detectionsBody.innerHTML = '<tr><td colspan="4">未检测到猪只</td></tr>';
        return;
      }
      detectionsBody.innerHTML = detections.map((det, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${det.class_name}</td>
          <td>${(det.confidence * 100).toFixed(1)}%</td>
          <td>${Math.round(det.x1)}, ${Math.round(det.y1)}, ${Math.round(det.x2)}, ${Math.round(det.y2)}</td>
        </tr>
      `).join('');
    }

    async function loadConfig() {
      try {
        const response = await fetch('/api/config');
        const data = await response.json();
        configHint.textContent = `当前模型: ${data.model_path}`;
      } catch (error) {
        configHint.textContent = `读取配置失败: ${error.message}`;
      }
    }

    async function healthCheck() {
      setStatus('正在检查服务状态...');
      try {
        const response = await fetch('/health');
        const data = await response.json();
        if (!response.ok || data.status !== 'healthy') {
          throw new Error(data.detail || JSON.stringify(data));
        }
        setStatus(`服务正常，设备: ${data.device}，模型: ${data.model_path}`, 'ok');
      } catch (error) {
        setStatus(`健康检查失败: ${error.message}`, 'error');
      }
    }

    healthBtn.addEventListener('click', healthCheck);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const file = fileInput.files[0];
      if (!file) {
        setStatus('请先选择一张图片。', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('模型推理中，请稍等...');
      fileName.textContent = file.name;
      renderImage(originalWrap, URL.createObjectURL(file), file.name);

      const formData = new FormData();
      formData.append('file', file);

      const query = new URLSearchParams({
        conf_threshold: confInput.value || '0.25',
        iou_threshold: iouInput.value || '0.45',
        imgsz: imgszInput.value || '960'
      });

      try {
        const response = await fetch(`/api/predict?${query.toString()}`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || data.error || '请求失败');
        }

        countValue.textContent = data.predicted_count;
        timeValue.textContent = `${data.processing_time_ms} ms`;
        sizeValue.textContent = `${data.image_width} x ${data.image_height}`;
        modelInfo.textContent = data.model_path;
        renderImage(annotatedWrap, data.annotated_image, `${file.name} annotated`);
        renderDetections(data.detections || []);
        setStatus(`推理完成，共检测到 ${data.predicted_count} 头猪。`, 'ok');
      } catch (error) {
        annotatedWrap.innerHTML = '<div class="placeholder">本次未拿到标注图。</div>';
        detectionsBody.innerHTML = '<tr><td colspan="4">请求失败</td></tr>';
        setStatus(`推理失败: ${error.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    loadConfig();
  </script>
</body>
</html>
